name: myschool-production

services:
  postgres:
    image: postgres:18-alpine
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    restart: unless-stopped

  backend:
    build:
      context: ./backend
    environment:
      SPRING_PROFILES_ACTIVE: prod
      DB_URL: jdbc:postgresql://postgres:5432/${DB_NAME}
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      OTP_PEPPER: ${OTP_PEPPER}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS}
      SMS_GATEWAY_URL: ${SMS_GATEWAY_URL}
      SMS_GATEWAY_API_KEY: ${SMS_GATEWAY_API_KEY}
      SMS_SENDER_ID: ${SMS_SENDER_ID:-MySchool}
      ASSISTANT_PROVIDER: ${ASSISTANT_PROVIDER:-openai}
      AI_CHAT_MODEL: ${AI_CHAT_MODEL:-openai}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
    depends_on:
      postgres:
        condition: service_healthy
    expose:
      - "8080"
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O - http://127.0.0.1:8080/actuator/health | grep -q UP"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 45s
    restart: unless-stopped
    stop_grace_period: 40s

  admin-web:
    build:
      context: ./admin-web
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "127.0.0.1:${ADMIN_WEB_PORT:-8081}:8080"
    read_only: true
    tmpfs:
      - /tmp
      - /var/cache/nginx
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O - http://127.0.0.1:8080/healthz | grep -q ok"]
      interval: 15s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  student-web:
    build:
      context: .
      args:
        API_BASE_URL: ${STUDENT_PUBLIC_URL}
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "127.0.0.1:${STUDENT_WEB_PORT:-8082}:8080"
    read_only: true
    tmpfs:
      - /tmp
      - /var/cache/nginx
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O - http://127.0.0.1:8080/healthz | grep -q ok"]
      interval: 15s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  postgres_data:
