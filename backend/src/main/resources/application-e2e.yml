app:
  assistant:
    usage:
      max-requests: 200
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://127.0.0.1:4173}
  security:
    auth:
      jwt-secret: e2e-only-jwt-signing-secret-not-for-production
      otp-pepper: e2e-only-otp-hashing-pepper-not-for-production
      password-strength: 4
      max-reset-requests-per-window: 10
    seed:
      phone-number: "0912345678"
      password: Student@123
      student-code: SE1913001
      full-name: Nhữ Xuân Việt
      grade-level: 10
      class-name: 10A1
    admin-seed:
      phone-number: "0900000000"
      password: Admin@123
      full-name: Quản trị FSchool

management:
  endpoints:
    web:
      cors:
        allowed-origins: ${CORS_ALLOWED_ORIGINS:http://127.0.0.1:4173}
  endpoint:
    health:
      show-details: always

springdoc:
  swagger-ui:
    enabled: false
